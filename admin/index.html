<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Admin Jubilaciones Misiones</title>
  <link rel="icon" href="../images/logonavyfavicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-card">
      <img src="../images/logonavyfavicon.png" alt="Jubilaciones Misiones" class="login-logo">
      <h1>Panel de Administración</h1>
      <p class="login-sub">Jubilaciones Misiones · Estudio Jurídico Previsional</p>
      <form id="loginForm" class="login-form" novalidate>
        <div class="field">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="admin@ejemplo.com" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="loginPass">Contraseña</label>
          <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <p class="login-error hidden" id="loginError"></p>
        <button type="submit" class="btn-admin btn-navy btn-block" id="loginBtn">Ingresar</button>
      </form>
    </div>
  </div>
  <script type="module" src="login.js"></script>
</body>
</html>
